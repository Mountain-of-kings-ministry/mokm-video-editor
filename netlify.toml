[build]
  # The path to your subfolder
  base = "web"

  # The command Netlify runs to build your site
  # Replace 'npm run build' if you use a different command (e.g., 'yarn build')
  command = "npm run build"

  # The directory containing the finished files (HTML, CSS, JS)
  # Common defaults are 'dist', 'build', or 'out'
  publish = "dist"

[build.environment]
  # Ensures the build uses a consistent Node version if needed
  NODE_VERSION = "20"
