name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          run: pwd
          cache-dependency-path: "./web/pnpm-lock.yaml"

      # Install from root - pnpm will find the /web folder via pnpm-workspace.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build specifically the web package
      - name: Build
        run: pnpm --filter web build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Verify if your build output is in 'dist' or 'build/client'
          path: ./web/build/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
